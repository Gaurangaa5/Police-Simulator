<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Car Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="car-body">
    <!-- Click overlay to satisfy browser audio policies -->
    <div id="audioUnlock" class="unlock-overlay"></div>

<div class="light-bar large" id="mainBar">

    <div class="side red-side">
        <div class="led red"></div>
        <div class="led red"></div>
        <div class="led red"></div>
        <div class="led red"></div>
    </div>

    <div class="side blue-side">
        <div class="led blue"></div>
        <div class="led blue"></div>
        <div class="led blue"></div>
        <div class="led blue"></div>
    </div>

</div>

    <script type="module" src="script.js"></script>
</body>
</html>
